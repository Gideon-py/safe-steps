services:
  mongodb:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build: ./backend
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - docker-compose.env
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=safesteps
      - CORS_ORIGINS=http://localhost:3000
    ports:
      - "8001:8001"
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/schools')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_BACKEND_URL=http://localhost:8001
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8001
    ports:
      - "3000:80"

volumes:
  mongo_data:
  backend_logs:
